<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>キッチンカー出店カレンダー</title> 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/japanese-holidays@1.0.10/lib/japanese-holidays.min.js"></script>
<style>
  body {font-family:sans-serif;background-color:#f4f4f4;padding:0;margin:0; -webkit-text-size-adjust: 100%; text-size-adjust: 100%;}
  #top-bar {background:#fff; padding:10px 15px; border-bottom:1px solid #ddd; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px;}
  
  /* ★ 追加・修正レイアウト */
  .left-group {display:flex; align-items:center; gap:10px; justify-self:start;}
  .right-group {display:flex; align-items:center; gap:10px; justify-self:end;}
  .update-time {font-size:12px; color:#666; white-space:nowrap;}
  
  #top-bar h2 {margin:0; font-size:1.3em; color:#ff8c00; font-family:'Noto Sans JP', sans-serif; font-weight:800; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; justify-self:center;}
  #top-bar button {padding:6px 12px; border-radius:4px; border:1px solid #ccc; font-size:14px; background-color:#6c757d; color:white; cursor:pointer; white-space:nowrap;}
  #top-bar button:hover {background-color:#5a6268;}
  .btn-icon {display:none;}
  #calendar-container {padding:20px; background:#fff; margin:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  
  .fc .fc-toolbar { display: grid !important; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; margin-bottom: 1em; }
  .fc .fc-toolbar-chunk:first-child { justify-self: start; display: flex; gap: 5px; }
  .fc .fc-toolbar-chunk:nth-child(2) { justify-self: center; }
  .fc .fc-toolbar-chunk:last-child { justify-self: end; display: flex; gap: 5px; }

  .fc .fc-daygrid-day-frame {min-height:120px;}
  .sunday-holiday {background-color:#ffe8e8;}
  .saturday {background-color:#eaf4ff;}
  .fc-day-today {background-color:#fff8e1!important;}
  .fc-list-day.sunday-holiday .fc-list-day-cushion {background-color:#ffe8e8 !important; color:#d32f2f !important;}
  .fc-list-day.saturday .fc-list-day-cushion {background-color:#eaf4ff !important; color:#0056b3 !important;}
  .list-day-time {font-size: 0.85em; font-weight: bold; color: #e67e22; margin-left: 10px; background: rgba(255,255,255,0.7); padding: 2px 6px; border-radius: 4px;}
  .fc-event {cursor:pointer; border:none!important; padding:4px 6px!important; border-radius:4px!important; font-size:0.8em!important;}
  .popup-overlay {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:1000;}
  .popup-content {background:#fff; padding:25px; border-radius:8px; width:90%; max-width:800px; box-shadow:0 5px 15px rgba(0,0,0,0.3); display:flex; flex-direction:column;}
  .popup-body {overflow-y:auto; flex-grow:1; margin-bottom:15px; max-height:65vh;}
  .popup-header {display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;}
  .popup-header h2 {margin:0;}
  .popup-footer {display:flex; justify-content:flex-end; align-items:center;}
  #event-list-table {width:100%; border-collapse:collapse;}
  #event-list-table th, #event-list-table td {border:1px solid #ddd; padding:8px; text-align:left;}
  #event-list-table th {background-color:#f2f2f2;}
  #detail-popup-body p {margin:10px 0;}
  #detail-popup-body strong {display:block; margin-bottom:4px; color:#333;}
  #detail-popup-body .description {white-space:pre-wrap; background-color:#f9f9f9; padding:10px; border-radius:4px; word-break:break-word;}
  #day-hover-popup {position:absolute; display:none; background-color:rgba(0,0,0,0.85); color:white; padding:10px 15px; border-radius:6px; z-index:1001; max-width:300px; box-shadow:0 4px 8px rgba(0,0,0,0.2); pointer-events:none; font-size:0.9em; line-height:1.6;}
  #day-hover-popup h3 {margin:0 0 8px 0; font-size:1em; padding-bottom:5px; border-bottom:1px solid #555;}
  #day-hover-popup div {margin-bottom:4px;}
  .fc .fc-daygrid-day-top {display:flex; flex-direction:row; justify-content:flex-end; align-items:baseline; padding:2px 4px; width:100%; box-sizing:border-box;}
  .fc .fc-daygrid-day-number {float:none !important; padding:0 !important;}
  .fc .day-cell-time {font-size:0.7em; font-weight:bold; color:#e67e22; line-height:1; margin-right:auto;}

  @media screen and (max-width: 1000px) {
      #top-bar {padding:8px 5px; gap: 5px;}
      .update-time {font-size:10px;}
      #top-bar h2 {font-size:1.1em;}
      .btn-text {display:none;}
      .btn-icon {display:inline-block; font-size:1.2em; line-height:1;}
      #top-bar button {padding:6px 8px;}
      #calendar-container {margin:5px; padding:10px;}
      .fc .fc-toolbar { gap: 2px !important; margin-bottom: 10px !important;}
      .fc .fc-toolbar-title {font-size: 1.1em !important; margin: 0 !important;}
      .fc .fc-button {padding: 0.3em 0.5em !important; font-size: 0.85em !important;}
  }
</style>
</head>
<body>
<div id="top-bar">
    <div class="left-group">
        <button id="show-qr-button" title="QRコード表示"><span class="btn-text">QR共有</span><span class="btn-icon">📱</span></button>
        <div class="update-time">更新:6/5 11:54</div>
    </div>
    <h2>キッチンカー出店カレンダー</h2>
    <div class="right-group">
        <button id="refresh-button" title="最新情報に更新"><span class="btn-text">情報更新</span><span class="btn-icon">🔄</span></button>
        <button id="show-list-button" title="予定店舗一覧"><span class="btn-text">予定店舗一覧</span><span class="btn-icon">📋</span></button>
    </div>
</div>
<div id="calendar-container"><div id="calendar"></div></div>
<div id="day-hover-popup"></div>

<!-- ★ QRコード表示ポップアップ -->
<div id="qr-popup" class="popup-overlay">
  <div class="popup-content" style="max-width:300px; text-align:center;">
    <div class="popup-header"><h2>共有用QRコード</h2></div>
    <div class="popup-body">
      <img id="qr-code-img" src="" alt="QR Code" style="width:200px; height:200px;">
      <p style="font-size:12px; color:#666;">このサイトのURLです<br>読み取ってシェアできます</p>
    </div>
    <div class="popup-footer" style="justify-content:center;"><button id="close-qr-popup-button" style="padding:6px 12px; border-radius:4px; border:1px solid #ccc; background-color:#6c757d; color:white; cursor:pointer;">閉じる</button></div>
  </div>
</div>

<div id="event-list-popup" class="popup-overlay">
  <div class="popup-content">
    <div class="popup-header"><h2>予定店舗一覧</h2><input type="text" id="popup-search-box" placeholder="一覧内を店舗名で検索..." style="padding:8px;border-radius:4px;border:1px solid #ccc;font-size:14px;width:50%;"></div>
    <div class="popup-body"><table id="event-list-table"><thead><tr><th>店舗名</th><th>日付</th><th>営業時間</th></tr></thead><tbody></tbody></table></div>
    <div class="popup-footer"><button id="close-list-popup-button">閉じる</button></div>
  </div>
</div>

<div id="detail-popup" class="popup-overlay">
  <div class="popup-content">
    <div class="popup-header"><h2>出店詳細</h2></div>
    <div id="detail-popup-body" class="popup-body">
      <p><strong>店舗名:</strong> <span id="detail-title"></span></p>
      <p><strong>出店日:</strong> <span id="detail-date"></span></p>
      <p><strong>営業時間:</strong> <span id="detail-time"></span></p>
      <p><strong>店舗説明 (提供商品など):</strong></p>
      <div id="detail-description" class="description"></div>
      <div id="instagram-container" style="display:none; margin-top: 15px;">
        <p><strong>Instagram:</strong></p>
        <a id="detail-instagram-link" href="#" target="_blank" rel="noopener noreferrer" style="word-break:break-all;"></a>
      </div>
    </div>
    <div class="popup-footer"><button id="close-detail-popup-button">閉じる</button></div>
  </div>
</div>

    const firstDaySetting = 0; 
    
    // ★ QRボタン＆更新ボタンの処理追加
    const qrPopup = document.getElementById('qr-popup');
    document.getElementById('show-qr-button').addEventListener('click', () => {
        const currentUrl = encodeURIComponent(window.location.href.split('#')[0].split('?')[0]);
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${currentUrl}`;
        qrPopup.style.display = 'flex';
    });
    document.getElementById('close-qr-popup-button').addEventListener('click', () => qrPopup.style.display = 'none');
    
    document.getElementById('refresh-button').addEventListener('click', () => {
        location.reload(); 
    });

    function addDayHoverListeners() {
        document.querySelectorAll('.fc-daygrid-day').forEach(cell => {
            cell.removeEventListener('mouseenter', handleDayMouseEnter);
            cell.removeEventListener('mouseleave', handleDayMouseLeave);
            cell.addEventListener('mouseenter', handleDayMouseEnter);
            cell.addEventListener('mouseleave', handleDayMouseLeave);
        });
    }

    function handleDayMouseEnter(e) {
        const dateStr = this.getAttribute('data-date');
        if (!dateStr) return;
        const dayEvents = events.filter(ev => ev.start && ev.start.startsWith(dateStr))
                                .sort((a, b) => new Date(a.start) - new Date(b.start));
        if (dayEvents.length === 0) return;

        const dateObj = new Date(dateStr + 'T12:00:00');
        let html = `<h3>${dateObj.getMonth() + 1}/${dateObj.getDate()}の出店</h3>`;
        dayEvents.forEach(ev => { html += `<div><strong>${ev.title}</strong></div>`; });
        
        hoverPopup.innerHTML = html; hoverPopup.style.display = 'block';
        hoverPopup.style.left = `${e.pageX + 15}px`; hoverPopup.style.top = `${e.pageY + 15}px`;
    }
    function handleDayMouseLeave() { hoverPopup.style.display = 'none'; }
    function updateTodayButton() {
        const todayBtn = document.querySelector('.fc-today-button');
        if (todayBtn) { todayBtn.innerText = window.innerWidth < 1000 ? '今月' : '今日'; }
    }

    const initialViewMode = window.innerWidth < 1000 ? 'listMonth' : 'dayGridMonth';
    const initialHeight = window.innerWidth < 1000 ? 'calc(100vh - 100px)' : 'auto';

    const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'ja', headerToolbar: { left: 'today', center: 'title', right: 'prev,next' },
        initialView: initialViewMode, firstDay: firstDaySetting, events: events, editable: false, height: initialHeight,
        eventClick: info => openDetailPopup(info.event), dayMaxEvents: true, displayEventTime: false,
        windowResize: function(arg) {
            if (window.innerWidth < 1000) {
                calendar.setOption('height', 'calc(100vh - 100px)');
                if (calendar.view.type !== 'listMonth') calendar.changeView('listMonth');
            } else {
                calendar.setOption('height', 'auto');
                if (calendar.view.type !== 'dayGridMonth') calendar.changeView('dayGridMonth');
            }
            updateTodayButton(); 
        },
        dayCellDidMount: function(arg) {
            if (calendar.view.type !== 'dayGridMonth') return; 
            const existingTimeEl = arg.el.querySelector('.day-cell-time');
            if (existingTimeEl) existingTimeEl.remove();
            
            const y = arg.date.getFullYear();
            const m = ('0' + (arg.date.getMonth() + 1)).slice(-2);
            const d = ('0' + arg.date.getDate()).slice(-2);
            const dateStr = `${y}-${m}-${d}`;
            const dayEvents = events.filter(ev => ev.start && ev.start.startsWith(dateStr));
            
            if (dayEvents.length > 0) {
                const firstEvent = dayEvents[0];
                const start = new Date(firstEvent.start); const end = new Date(firstEvent.end);
                const timeStr = `${('0'+start.getHours()).slice(-2)}:${('0'+start.getMinutes()).slice(-2)}-${('0'+end.getHours()).slice(-2)}:${('0'+end.getMinutes()).slice(-2)}`;
                const timeEl = document.createElement('div'); timeEl.className = 'day-cell-time'; timeEl.innerText = timeStr;
                const dayNumberEl = arg.el.querySelector('.fc-daygrid-day-number');
                if (dayNumberEl) dayNumberEl.before(timeEl);
            }
        },
        datesSet: info => {
            applyDateStyles(info); 
            if (calendar.view.type === 'dayGridMonth') addDayHoverListeners();
            updateTodayButton(); 
        },
        viewDidMount: () => {
            if (calendar.view.type === 'dayGridMonth') addDayHoverListeners();
            updateTodayButton();
        }
    });
    calendar.render();

    function applyDateStyles(dateInfo) {
        document.querySelectorAll('.fc-daygrid-day.saturday, .fc-daygrid-day.sunday-holiday').forEach(c => c.classList.remove('saturday', 'sunday-holiday'));
        document.querySelectorAll('.fc-list-day.saturday, .fc-list-day.sunday-holiday').forEach(c => c.classList.remove('saturday', 'sunday-holiday'));
        document.querySelectorAll('.list-day-time').forEach(el => el.remove());

        let current = new Date(dateInfo.start);
        while (current < dateInfo.end) {
            const dateStr = `${current.getFullYear()}-${('0' + (current.getMonth() + 1)).slice(-2)}-${('0' + current.getDate()).slice(-2)}`;
            const dayOfWeek = current.getDay(); const isHoliday = JapaneseHolidays.isHoliday(current);
            const gridDayCell = document.querySelector(`.fc-daygrid-day[data-date="${dateStr}"]`);
            if (gridDayCell) {
                if (isHoliday || dayOfWeek === 0) gridDayCell.classList.add('sunday-holiday');
                else if (dayOfWeek === 6) gridDayCell.classList.add('saturday');
            }
            const listDayRow = document.querySelector(`.fc-list-day[data-date="${dateStr}"]`);
            if (listDayRow) {
                if (isHoliday || dayOfWeek === 0) listDayRow.classList.add('sunday-holiday');
                else if (dayOfWeek === 6) listDayRow.classList.add('saturday');
                
                const dayEvents = events.filter(ev => ev.start && ev.start.startsWith(dateStr));
                if (dayEvents.length > 0) {
                    const firstEvent = dayEvents[0];
                    const start = new Date(firstEvent.start); const end = new Date(firstEvent.end);
                    const timeStr = `${('0'+start.getHours()).slice(-2)}:${('0'+start.getMinutes()).slice(-2)} - ${('0'+end.getHours()).slice(-2)}:${('0'+end.getMinutes()).slice(-2)}`;
                    const textContainer = listDayRow.querySelector('.fc-list-day-text');
                    if (textContainer) {
                        const timeSpan = document.createElement('span'); timeSpan.className = 'list-day-time'; timeSpan.innerText = timeStr; textContainer.appendChild(timeSpan);
                    }
                }
            }
            current.setDate(current.getDate() + 1);
        }
    }

    const listPopup = document.getElementById('event-list-popup');
    const detailPopup = document.getElementById('detail-popup');

    function openDetailPopup(event) {
        document.getElementById('detail-title').textContent = event.title;
        const start = new Date(event.start); const end = event.end ? new Date(event.end) : start;
        document.getElementById('detail-date').textContent = `${start.getFullYear()}年${start.getMonth() + 1}月${start.getDate()}日`;
        document.getElementById('detail-time').textContent = `${('0'+start.getHours()).slice(-2)}:${('0'+start.getMinutes()).slice(-2)} - ${('0'+end.getHours()).slice(-2)}:${('0'+end.getMinutes()).slice(-2)}`;
        const desc = event.extendedProps.description || '説明はありません';
        document.getElementById('detail-description').textContent = desc;
        const instagramContainer = document.getElementById('instagram-container');
        const instagramLink = document.getElementById('detail-instagram-link');
        const instagramUrl = event.extendedProps.instagramUrl;
        if (instagramUrl) {
            instagramLink.href = instagramUrl; instagramLink.textContent = instagramUrl; instagramContainer.style.display = 'block';
        } else {
            instagramContainer.style.display = 'none';
        }
        detailPopup.style.display = 'flex';
    }

    function updateEventList() {
        const tbody = document.querySelector('#event-list-table tbody');
        tbody.innerHTML = '';
        [...events].sort((a,b) => new Date(a.start) - new Date(b.start)).forEach(ev => {
            const start = new Date(ev.start); const end = ev.end ? new Date(ev.end) : start;
            const time = `${('0'+start.getHours()).slice(-2)}:${('0'+start.getMinutes()).slice(-2)} - ${('0'+end.getHours()).slice(-2)}:${('0'+end.getMinutes()).slice(-2)}`;
            const row = tbody.insertRow();
            row.insertCell().textContent = ev.title; row.insertCell().textContent = `${start.getFullYear()}/${start.getMonth() + 1}/${start.getDate()}`; row.insertCell().textContent = time;
        });
    }

    document.getElementById('show-list-button').addEventListener('click', () => { updateEventList(); listPopup.style.display = 'flex'; });
    document.getElementById('close-list-popup-button').addEventListener('click', () => listPopup.style.display = 'none');
    document.getElementById('close-detail-popup-button').addEventListener('click', () => detailPopup.style.display = 'none');
    [listPopup, detailPopup, qrPopup].forEach(p => p.addEventListener('click', e => { if (e.target === p) p.style.display = 'none'; }));
    document.getElementById('popup-search-box').addEventListener('input', e => {
        const searchTerm = e.target.value.toLowerCase();
        document.querySelectorAll('#event-list-table tbody tr').forEach(row => { row.style.display = row.cells[0].textContent.toLowerCase().includes(searchTerm) ? '' : 'none'; });
    });
    updateEventList();
});
</script>
</body>
</html>
